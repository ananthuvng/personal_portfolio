<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ananthu V N G — Interactive 3D Portfolio World</title>
  <meta name="description" content="Explore Ananthu V N G's portfolio in an immersive 3D world. Walk through interactive spaces showcasing projects, experience, and more.">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a1a">

  <!-- Open Graph / Social -->
  <meta property="og:title" content="Ananthu V N G — Interactive 3D Portfolio">
  <meta property="og:description" content="A walkable 3D world portfolio. Navigate a sci-fi environment to discover projects, experience, and more.">
  <meta property="og:type" content="website">

  <link rel="stylesheet" type="text/css" href="base.css">
</head>
<body>

  <!-- Welcome / Landing Screen -->
  <div id="welcome-screen">
    <div class="welcome-particles" id="welcome-particles"></div>
    <!-- 3D Character Preview -->
    <div id="welcome-3d-canvas"></div>
    <div class="welcome-content">
      <div class="welcome-badge">
        <span class="dot"></span>
        Portfolio
      </div>
      <h1 class="welcome-name">Ananthu</h1>
      <p class="welcome-tagline">Step into my world — an immersive 3D space where you can walk, explore, and discover my work.</p>
      <button class="welcome-enter-btn" id="enter-world-btn">
        Enter World
        <span class="arrow">→</span>
      </button>
      <p class="welcome-hint" id="welcome-hint">Best on desktop · WASD to move · Mouse to look around</p>
    </div>
  </div>

  <!-- HUD Controls Hint -->
  <div id="controls-hud" style="display:none;">
    <div class="hud-row">
      <div class="hud-key" id="hud-w">W</div>
    </div>
    <div class="hud-row">
      <div class="hud-key" id="hud-a">A</div>
      <div class="hud-key" id="hud-s">S</div>
      <div class="hud-key" id="hud-d">D</div>
    </div>
    <div class="hud-row">
      <div class="hud-key wide" id="hud-shift">Shift</div>
    </div>
    <div class="hud-label">Move · Hold Shift to run</div>
  </div>

  <!-- Mobile Virtual Joystick -->
  <div id="mobile-joystick">
    <div class="joystick-base" id="joystick-base">
      <div class="joystick-stick" id="joystick-stick"></div>
    </div>
  </div>

  <!-- Mobile Interaction Hint -->
  <div id="mobile-tap-hint">Tap on objects to interact</div>

  <!-- Interaction Prompt -->
  <div id="interaction-prompt">Click to interact</div>

  <!-- 3D Welcome Character Preview -->
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.118/build/three.module.js';
    import { FBXLoader } from 'https://cdn.jsdelivr.net/npm/three@0.118.1/examples/jsm/loaders/FBXLoader.js';

    const container = document.getElementById('welcome-3d-canvas');
    if (container) {
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(0, 100, 300);
      camera.lookAt(0, 80, 0);

      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputEncoding = THREE.sRGBEncoding;
      container.appendChild(renderer.domElement);

      // Lighting
      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(5, 10, 7);
      scene.add(dirLight);
      const rimLight = new THREE.DirectionalLight(0x26fffd, 0.6);
      rimLight.position.set(-5, 5, -5);
      scene.add(rimLight);
      const bottomLight = new THREE.DirectionalLight(0xa855f7, 0.3);
      bottomLight.position.set(0, -5, 0);
      scene.add(bottomLight);

      let mixer = null;
      const clock = new THREE.Clock();
      let animRunning = true;

      const loader = new FBXLoader();
      loader.setPath('./resources/models/');
      loader.load('ananthu.fbx', (fbx) => {
        fbx.scale.setScalar(0.95);
        fbx.position.set(0, -10, 0);
        fbx.traverse((c) => {
          if (c.isMesh) {
            const oldMat = c.material;
            c.material = new THREE.MeshStandardMaterial({
              color: oldMat.color,
              map: oldMat.map,
              metalness: 0.15,
              roughness: 0.7,
              morphTargets: true,
              morphNormals: true,
              skinning: true,
            });
          }
        });
        scene.add(fbx);
        mixer = new THREE.AnimationMixer(fbx);

        // Load breathing idle animation
        loader.load('breathing.fbx', (anim) => {
          const clip = anim.animations[0];
          const action = mixer.clipAction(clip);
          action.play();
        });
      });

      // Slow orbit camera
      let angle = 0;
      function animate() {
        if (!animRunning) return;
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        if (mixer) mixer.update(dt);
        angle += 0.004;
        camera.position.x = Math.sin(angle) * 280;
        camera.position.z = Math.cos(angle) * 280;
        camera.lookAt(0, 80, 0);
        renderer.render(scene, camera);
      }
      animate();

      // Stop animation when entering the world to free resources
      document.getElementById('enter-world-btn').addEventListener('click', () => {
        animRunning = false;
        renderer.dispose();
      });

      window.addEventListener('resize', () => {
        if (!animRunning) return;
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
      });
    }
  </script>

  <script src="./main.js" type="module"></script>
</body>
</html>
